<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111a20"/>
      <stop offset="100%" stop-color="#1a2a34"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="270" rx="2" fill="url(#accent)" opacity="0.9"/>

  <!-- Glow blob top-right -->
  <ellipse cx="1050" cy="120" rx="220" ry="160" fill="#38bdf8" opacity="0.06"/>

  <!-- SKC Digital wordmark -->
  <text x="108" y="270" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">SKC Digital</text>

  <!-- Tagline -->
  <text x="108" y="332" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8" letter-spacing="0">IT solutions built to scale your business</text>

  <!-- Divider line -->
  <line x1="108" y1="370" x2="480" y2="370" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>

  <!-- Service tags -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#64748b">
    <text x="108" y="412">Web Development</text>
    <text x="108" y="444">Excel &amp; Automation</text>
    <text x="108" y="476">Bookkeeping &amp; Records</text>
  </g>
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#64748b">
    <text x="360" y="412">Business Automation</text>
    <text x="360" y="444">Digital Setup</text>
    <text x="360" y="476">Free Audit Available</text>
  </g>

  <!-- Domain badge -->
  <rect x="108" y="534" width="220" height="42" rx="8" fill="#38bdf8" opacity="0.12"/>
  <text x="218" y="561" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#38bdf8" text-anchor="middle" letter-spacing="0.5">skcdigital.co.za</text>

  <!-- Location badge -->
  <rect x="346" y="534" width="180" height="42" rx="8" fill="#ffffff" opacity="0.05"/>
  <text x="436" y="561" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#94a3b8" text-anchor="middle">Pretoria · SA</text>

  <!-- Right side decorative terminal block -->
  <rect x="720" y="160" width="400" height="310" rx="12" fill="#0f1923" stroke="#1e3040" stroke-width="1.5"/>
  <!-- Terminal header bar -->
  <rect x="720" y="160" width="400" height="40" rx="12" fill="#162028"/>
  <rect x="720" y="188" width="400" height="12" fill="#162028"/>
  <circle cx="752" cy="180" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="774" cy="180" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="796" cy="180" r="6" fill="#22c55e" opacity="0.7"/>
  <!-- Terminal text lines -->
  <text x="744" y="232" font-family="'JetBrains Mono', 'Cascadia Code', monospace" font-size="14" fill="#38bdf8">$ skc audit --business</text>
  <text x="744" y="262" font-family="'JetBrains Mono', 'Cascadia Code', monospace" font-size="13" fill="#4ade80">✓ Website live &amp; indexed</text>
  <text x="744" y="290" font-family="'JetBrains Mono', 'Cascadia Code', monospace" font-size="13" fill="#4ade80">✓ Bookkeeping clean</text>
  <text x="744" y="318" font-family="'JetBrains Mono', 'Cascadia Code', monospace" font-size="13" fill="#4ade80">✓ Automation active</text>
  <text x="744" y="346" font-family="'JetBrains Mono', 'Cascadia Code', monospace" font-size="13" fill="#4ade80">✓ Google Business set up</text>
  <text x="744" y="382" font-family="'JetBrains Mono', 'Cascadia Code', monospace" font-size="14" fill="#94a3b8">Ready. Delivered in 48 hrs.</text>
  <text x="744" y="412" font-family="'JetBrains Mono', 'Cascadia Code', monospace" font-size="14" fill="#38bdf8">█<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></text>
</svg>
