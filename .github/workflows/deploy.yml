name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund

      - name: Build
        run: npm run build
        env:
          VITE_ADMIN_EMAILS: "info@skcdigital.co.za,suzankwinika0@gmail.com"

      - name: Inject runtime env vars into wrangler config
        continue-on-error: true
        run: node scripts/patch-wrangler.js
        env:
          RESEND_API_KEY: "re_G2fzGzrg_KHvWGqWFhAtmRKWawhujrdh6"
          SUPABASE_URL: "https://abucbojsosfxdaufdapw.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "sb_secret_urfmnu1WLcDFIszum0z1ag_itAwuxM_"
          PAYFAST_MERCHANT_ID: "34991025"
          PAYFAST_MERCHANT_KEY: "sfu7q6oaqtpvu"
          PAYFAST_PASSPHRASE: "SKc0402231235084"
          PAYFAST_SANDBOX: "false"
          SITE_URL: "https://www.skcdigital.co.za"

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "5284ea7e91939f82da831392b31b8fb3"
