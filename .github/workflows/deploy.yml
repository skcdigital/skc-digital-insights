name: Deploy to Cloudflare

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: "5284ea7e91939f82da831392b31b8fb3"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --no-fund

      - run: npm run build

      - name: Deploy to Cloudflare Workers
        run: |
          rm -rf .wrangler
          cd dist/server
          npx wrangler deploy
